<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>𝐒𝐭𝐫𝐞𝐚𝐦 𝐗 𝐁𝐃</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;800;900&display=swap" rel="stylesheet">
    
    <style>
        :root { --bg-color: #050505; --accent: #ff0000; --tg-color: #0088cc; }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; margin: 0; padding: 0; }
        
        body, html { 
            margin: 0; 
            padding: 0; 
            width: 100%; 
            height: 100%;
            background-color: var(--bg-color); 
            color: #fff; 
            font-family: 'Poppins', sans-serif; 
            overflow: hidden;
        }

        .wrapper { 
            display: flex; 
            flex-direction: column; 
            height: 100vh; 
            width: 100%; 
        }
        
        .header-line { 
            width: 100%; 
            height: 5px; 
            background: var(--accent); 
            flex-shrink: 0; 
        }

        .app-container { 
            display: flex; 
            flex: 1; 
            min-height: 0;
            overflow: hidden;
        }

        /* Player Area */
        .player-area { 
            flex: 1.8; 
            background: #000; 
            display: flex; 
            flex-direction: column; 
            justify-content: center; 
            padding: 10px 0;
            border-bottom: 4px solid var(--accent);
            min-height: 0;
        }
        
        .video-box { 
            width: 100%; 
            max-width: 1000px; 
            margin: 0 auto; 
            position: relative; 
            background: #000; 
        }
        
        .video-box::before { 
            content: ""; 
            display: block; 
            padding-top: 56.25%; 
        }
        
        iframe { 
            position: absolute; 
            top: 0; 
            left: 0; 
            width: 100%; 
            height: 100%; 
            border: none; 
        }

        /* Content Area */
        .content-area { 
            flex: 1; 
            display: flex; 
            flex-direction: column; 
            background: #080808; 
            min-height: 0;
            height: 100%;
        }

        /* Tabs */
        .tab-wrapper { 
            background: #000; 
            padding: 15px 0; 
            text-align: center; 
            width: 100%;
            overflow-x: auto; 
            scrollbar-width: none; 
            white-space: nowrap;
            flex-shrink: 0;
        }
        
        .tab-wrapper::-webkit-scrollbar { 
            display: none; 
        }
        
        .tab-inner { 
            display: inline-flex; 
            gap: 10px; 
            padding: 0 20px; 
        }

        .tab-btn { 
            padding: 10px 18px; 
            background: #111; 
            border-radius: 8px; 
            font-size: 13px; 
            font-weight: 800; 
            cursor: pointer; 
            border: 1px solid #333; 
            color: #888; 
            transition: 0.3s;
        }
        
        .tab-btn.active { 
            background: var(--accent); 
            color: #fff; 
            border-color: #fff; 
            box-shadow: 0 0 10px rgba(255,0,0,0.5); 
        }

        /* Channel Container - এখন স্ক্রোল হবে */
        .channel-container { 
            padding: 15px; 
            flex: 1; 
            width: 100%; 
            overflow-y: auto;
            overflow-x: hidden;
            min-height: 0;
            height: 100%;
        }
        
        /* স্ক্রোলবার স্টাইল */
        .channel-container::-webkit-scrollbar {
            width: 6px;
        }
        
        .channel-container::-webkit-scrollbar-track {
            background: #222;
            border-radius: 10px;
        }
        
        .channel-container::-webkit-scrollbar-thumb {
            background: var(--accent);
            border-radius: 10px;
        }
        
        .channel-container::-webkit-scrollbar-thumb:hover {
            background: #ff3333;
        }
        
        .channel-grid { 
            display: none; 
            width: 100%; 
            max-width: 1200px;
            grid-template-columns: repeat(auto-fit, minmax(110px, 1fr)); 
            gap: 15px; 
            justify-content: center;
            margin: 0 auto;
        }
        
        .channel-grid.active { 
            display: grid; 
        }
        
        /* Channel Cards */
        .channel-card { 
            position: relative; 
            background: #111; 
            border-radius: 12px; 
            padding: 2.5px;
            cursor: pointer; 
            aspect-ratio: 16/10; 
            overflow: hidden; 
            z-index: 1; 
            transition: 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .channel-card::before { 
            content: ""; 
            position: absolute; 
            width: 250%; 
            height: 250%; 
            top: -75%; 
            left: -75%; 
            background: conic-gradient(from 0deg, red, yellow, lime, aqua, blue, magenta, red); 
            animation: rotateRGB 3s linear infinite; 
            z-index: -1; 
            opacity: 0.7;
        }

        .channel-card.active { 
            transform: scale(1.06); 
            padding: 5px; 
            box-shadow: 0 0 25px rgba(255, 0, 0, 0.6); 
        }
        
        .channel-card.active::before { 
            animation: rotateRGB 1.2s linear infinite; 
            filter: blur(1px);
            opacity: 1;
        }
        
        .inner-card { 
            background: #fff; 
            width: 100%; 
            height: 100%; 
            border-radius: 8px; 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            overflow: hidden; 
        }
        
        .inner-card img { 
            width: 70%; 
            height: 70%; 
            object-fit: contain; 
            transform: scale(1.5); 
        } 
        
        @keyframes rotateRGB { 
            100% { transform: rotate(360deg); } 
        }

        /* ===== নতুন ফুটার ডিজাইন ===== */
        .footer {
            background: #111;
            color: #fff;
            text-align: center;
            padding: 25px 15px;
            border-top: 2px solid var(--accent);
            flex-shrink: 0;
        }

        .footer-copy {
            font-size: 14px;
            color: #ccc;
            line-height: 1.6;
        }

        .footer-copy .brand {
            color: #00ffcc;
            font-weight: bold;
            letter-spacing: 0.5px;
        }

        .footer-credit {
            margin-top: 10px;
            font-size: 14px;
            color: #aaa;
            line-height: 1.8;
        }

        .footer-credit span {
            color: #00ffcc;
            font-weight: bold;
        }

        .footer-credit b {
            color: #ffffff;
            font-weight: 700;
        }

        /* Mobile Fixes */
        @media (max-width: 768px) {
            .app-container { 
                flex-direction: column;
            }
            
            .player-area { 
                flex: none; 
                width: 100%; 
                border-bottom: 4px solid var(--accent);
            }
            
            .channel-grid { 
                grid-template-columns: repeat(3, 1fr); 
                gap: 10px; 
            }
            
            .footer {
                padding: 20px 12px;
            }
            
            .footer-copy,
            .footer-credit {
                font-size: 12px;
            }
        }
    </style>
</head>
<body>

<div class="wrapper">
    <div class="header-line"></div>
    <div class="app-container">
        <div class="player-area">
            <div class="video-box">
                <iframe id="tvPlayer" src="" allow="autoplay; encrypted-media" allowfullscreen="true"></iframe>
            </div>
        </div>
        <div class="content-area">
            <div id="tabWrapper" class="tab-wrapper">
                <div class="tab-inner" id="tabInner"></div>
            </div>
            <div id="channelContainer" class="channel-container"></div>
        </div>
    </div>
    
    <!-- নতুন ফুটার -->
    <footer class="footer">
        <div class="footer-copy">
            Copyright © <span id="year"></span> 
            <span class="brand">Stream X BD</span>. All rights reserved.
        </div>
        <div class="footer-credit">
            <p>Special Thanks: <span>SM Team</span></p>
            <p>Developer: <b>Monirul Islam</b></p>
        </div>
    </footer>
</div>

<script>
    // Auto Year Script
    document.getElementById("year").textContent = new Date().getFullYear();

    // চ্যানেল লোড করার ফাংশন
    async function initApp() {
        try {
            const response = await fetch('channels.json');
            const data = await response.json();
            const tabInner = document.getElementById('tabInner');
            const channelContainer = document.getElementById('channelContainer');
            let isFirst = true;

            tabInner.innerHTML = '';
            channelContainer.innerHTML = '';

            Object.keys(data).forEach((category, index) => {
                const btn = document.createElement('div');
                btn.className = `tab-btn ${isFirst ? 'active' : ''}`;
                btn.innerText = category;
                btn.onclick = (e) => openTab(e, `cat_${index}`);
                tabInner.appendChild(btn);

                const grid = document.createElement('div');
                grid.id = `cat_${index}`;
                grid.className = `channel-grid ${isFirst ? 'active' : ''}`;

                data[category].forEach((chan, chIndex) => {
                    const card = document.createElement('div');
                    card.className = 'channel-card';
                    card.innerHTML = `<div class="inner-card"><img src="${chan.logo}" alt="${chan.name}"></div>`;
                    card.onclick = () => loadChannel(chan.url, card);
                    grid.appendChild(card);
                    
                    if(isFirst && chIndex === 0) {
                        setTimeout(() => loadChannel(chan.url, card), 100);
                    }
                });
                
                channelContainer.appendChild(grid);
                isFirst = false;
            });

        } catch (e) { 
            console.error('Error loading channels:', e);
            document.getElementById('channelContainer').innerHTML = '<p style="color:red; padding:20px; text-align:center;">⚠️ চ্যানেল লোড করতে সমস্যা হচ্ছে। পরে আবার চেষ্টা করুন।</p>';
        }
    }

    function openTab(evt, catId) {
        document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
        evt.currentTarget.classList.add('active');
        document.querySelectorAll('.channel-grid').forEach(g => g.classList.remove('active'));
        document.getElementById(catId).classList.add('active');
    }

    function loadChannel(url, el) {
        document.querySelectorAll('.channel-card').forEach(c => c.classList.remove('active'));
        el.classList.add('active');
        document.getElementById('tvPlayer').src = url;
    }

    window.onload = initApp;
</script>
</body>
</html>
