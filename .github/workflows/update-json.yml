name: 🔄 Update JSON

on:
  workflow_dispatch:
  schedule:
    - cron: "*/30 * * * *"   # প্রতি 30 মিনিটে run হবে

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest

    steps:
      - name: 📦 Checkout repo
        uses: actions/checkout@v4

      - name: 🐍 Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.x"

      - name: ▶️ Run script
        run: python convert.py

      - name: 💾 Commit & Push
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add output.json
          git commit -m "🔄 Auto update JSON" || echo "No changes"
          git push
